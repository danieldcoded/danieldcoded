name: Waka - Readme

on:
  workflow_dispatch:
  schedule:
    # Runs at 12am UTC
    - cron: "0 0 * * *"

# Lets the built-in GITHUB_TOKEN commit the updated README, so no personal
# GH_TOKEN secret is needed — only WAKATIME_API_KEY (add it in repo Settings →
# Secrets and variables → Actions).
permissions:
  contents: write

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@v0.3.1
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TIME: "true"
          SHOW_TOTAL: "true"
          TIME_RANGE: "last_7_days"
